<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solidity Shakyo Exact-Match Quiz</title>
<style>
  :root {
    --bg:        #F5EFE0;
    --bg-soft:   #EDE4D0;
    --card:      #FBF7EC;
    --ink:       #2E3A3A;
    --muted:     #6B7775;
    --accent:    #5B8A8A;
    --accent-d:  #406A6A;
    --good:      #7BA77B;
    --good-bg:   #DFEBDC;
    --bad:       #B8746B;
    --bad-bg:    #EFD9D3;
    --hi:        #E8C97A;
    --line:      #d8cfba;
    --shadow:    0 2px 0 rgba(46,58,58,0.08), 0 6px 18px rgba(46,58,58,0.06);
    --radius:    14px;
    --code: #192020;
    --code-soft: #25302f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background:
      linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,0) 260px),
      var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.55;
    padding: 24px 14px 56px;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 1040px; }
  header {
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr auto;
    align-items: end;
    margin: 0 0 14px;
  }
  h1 { margin: 0; color: var(--accent-d); font-size: 1.45rem; letter-spacing: .2px; }
  header p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 720px; }
  .timer-pill {
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    min-width: 112px;
    background: linear-gradient(180deg, #FFFDF6, var(--card));
    border: 1px solid var(--line);
    border-radius: 999px;
    box-shadow: 0 5px 16px rgba(46,58,58,.07), inset 0 1px 0 rgba(255,255,255,.7);
    color: var(--accent-d);
    font-weight: 800;
    padding: 7px 15px 8px 12px;
    letter-spacing: .6px;
  }
  .timer-pill.warning { background: linear-gradient(180deg, #fff8f2, var(--bad-bg)); border-color: var(--bad); color: #5a2c26; }
  .timer-pill.idle { color: var(--muted); font-weight: 700; }
  .stopwatch {
    position: relative;
    width: 22px;
    height: 22px;
    border: 2px solid currentColor;
    border-radius: 50%;
    flex: 0 0 auto;
    opacity: .9;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.45);
  }
  .stopwatch::before {
    content: "";
    position: absolute;
    width: 8px;
    height: 4px;
    border-radius: 4px 4px 2px 2px;
    background: currentColor;
    left: 50%;
    top: -7px;
    transform: translateX(-50%);
    opacity: .82;
  }
  .stopwatch::after {
    content: "";
    position: absolute;
    width: 5px;
    height: 3px;
    border-radius: 4px;
    background: currentColor;
    right: -5px;
    top: 1px;
    transform: rotate(38deg);
    opacity: .65;
  }
  .stopwatch-hand {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 7px;
    border-radius: 999px;
    background: currentColor;
    transform-origin: 50% 100%;
    transform: translate(-50%, -100%) rotate(0deg);
  }
  .timer-pill.running .stopwatch-hand { animation: stopwatchTick var(--timer-duration, 900s) linear forwards; }
  .stopwatch-hand::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -3px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: currentColor;
    transform: translateX(-50%);
  }
  @keyframes stopwatchTick {
    from { transform: translate(-50%, -100%) rotate(0deg); }
    to { transform: translate(-50%, -100%) rotate(360deg); }
  }
  .card {
    background: var(--card);
    border: 1px solid rgba(216,207,186,.92);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
  }
  .opening { display: grid; gap: 18px; }
  .opening-top {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(240px, .9fr);
    gap: 18px;
    align-items: stretch;
  }
  .hero-panel {
    background: #FFFDF6;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  .hero-panel h2 { margin: 0 0 8px; color: var(--accent-d); font-size: 1.32rem; }
  .hero-panel p { margin: 8px 0 0; color: var(--muted); }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }
  .stat {
    min-height: 78px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat b { display: block; color: var(--accent-d); font-size: 1.38rem; line-height: 1.1; }
  .stat span { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }
  .mode-list { display: grid; gap: 10px; }
  .mode-card {
    width: 100%;
    text-align: left;
    background: #FFFDF6;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    color: var(--ink);
    cursor: pointer;
    padding: 14px;
    font: inherit;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .mode-card:hover { transform: translateY(-1px); border-color: var(--accent); background: #FFFEFA; }
  .mode-card strong { display: flex; justify-content: space-between; gap: 10px; color: var(--accent-d); font-size: 1rem; }
  .mode-card span { display: block; color: var(--muted); font-size: .85rem; margin-top: 4px; }
  .pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--hi);
    color: #6b4f1a;
    font-size: .72rem;
    font-weight: 800;
    letter-spacing: .4px;
    white-space: nowrap;
  }
  .pill.p0 { background: var(--good-bg); color: #2f4a2f; }
  .pill.p1 { background: #fff4c2; color: #6b4f1a; }
  .pill.p2 { background: #e5eef2; color: #355967; }
  .tiny-note { color: var(--muted); font-size: .82rem; margin-top: 8px; }
  .history { background: #FFFDF6; border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
  .history h3 { margin: 0 0 10px; color: var(--accent-d); font-size: 1rem; }
  .history ol { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
  .history li {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 9px 11px;
    font-size: .9rem;
  }
  .history .meta { color: var(--muted); font-size: .8rem; }
  .history .score { font-weight: 800; white-space: nowrap; }
  .quiz-shell { display: grid; gap: 12px; }
  .quiz-meta {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: end;
  }
  .quiz-title { color: var(--accent-d); font-weight: 800; }
  .quiz-sub { color: var(--muted); font-size: .86rem; }
  .jump {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    justify-content: center;
    margin: 2px 0;
  }
  .jump button {
    min-width: 36px;
    height: 34px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    color: var(--accent-d);
    font-weight: 800;
    cursor: pointer;
  }
  .jump button.current { background: var(--accent); color: #fff; border-color: var(--accent-d); }
  .jump button.correct { background: var(--good-bg); border-color: var(--good); color: #2f4a2f; }
  .jump button.revealed { background: var(--bad-bg); border-color: var(--bad); color: #5a2c26; }
  .progress-track { width: 100%; height: 7px; background: var(--bg-soft); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width .25s ease; }
  .question-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    margin-bottom: 14px;
  }
  .eyebrow {
    color: var(--accent);
    font-size: .76rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 800;
    margin-bottom: 5px;
  }
  .question-title { font-size: 1.12rem; color: var(--ink); font-weight: 800; margin: 0; }
  .source { color: var(--muted); font-size: .84rem; margin-top: 5px; }
  .purpose {
    background: rgba(91,138,138,.08);
    border-left: 4px solid var(--accent);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--ink);
    font-size: .92rem;
    margin: 12px 0;
  }
  .target-chip {
    display: inline-block;
    margin-top: 8px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--accent-d);
    font-size: .78rem;
    font-weight: 800;
    padding: 5px 9px;
  }
  .editor-grid { display: grid; grid-template-columns: minmax(0, 1fr) 270px; gap: 14px; align-items: start; }
  .writer-panel {
    background: #FFFDF6;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 10px;
  }
  .editor-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 0 0 9px;
  }
  .editor-toolbar span {
    color: var(--muted);
    font-size: .78rem;
    font-weight: 800;
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  .editor-toolbar .btn { min-height: 38px; padding: 8px 13px; }
  textarea {
    width: 100%;
    min-height: 210px;
    resize: vertical;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: #FFFDF6;
    color: var(--ink);
    font: 14px/1.48 "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    padding: 13px 14px;
    tab-size: 4;
    white-space: pre;
    overflow: auto;
  }
  textarea:focus { outline: 3px solid rgba(91,138,138,.18); border-color: var(--accent); }
  textarea.locked-correct { background: var(--good-bg); border-color: var(--good); color: #253d25; }
  textarea.locked-revealed { background: var(--bad-bg); border-color: var(--bad); color: #4d2823; }
  textarea.run-error {
    border-color: #c98b54;
    box-shadow: 0 0 0 3px rgba(232,201,122,.25), 0 0 22px rgba(184,116,107,.18);
    animation: inputGlow 1.3s ease-in-out infinite;
  }
  @keyframes inputGlow {
    0%, 100% { box-shadow: 0 0 0 3px rgba(232,201,122,.20), 0 0 14px rgba(184,116,107,.16); }
    50% { box-shadow: 0 0 0 4px rgba(232,201,122,.34), 0 0 26px rgba(184,116,107,.24); }
  }
  .side-panel { display: grid; gap: 10px; }
  .metric-box {
    background: #FFFDF6;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 11px;
  }
  .metric-box b { display: block; color: var(--accent-d); font-size: .84rem; margin-bottom: 4px; }
  .metric-box span, .metric-box div { color: var(--muted); font-size: .82rem; }
  .feedback {
    margin-top: 12px;
    border-radius: 10px;
    padding: 11px 13px;
    font-size: .92rem;
    display: none;
  }
  .feedback.good { display: block; background: var(--good-bg); color: #2f4a2f; }
  .feedback.bad { display: block; background: var(--bad-bg); color: #5a2c26; }
  .feedback.info { display: block; background: var(--bg-soft); color: var(--ink); }
  .answer-panel, .run-console {
    display: none;
    margin-top: 12px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .answer-panel.show, .run-console.show { display: block; }
  .writer-panel .answer-panel { margin: 8px 0 10px; }
  .panel-title {
    background: var(--bg-soft);
    color: var(--accent-d);
    padding: 9px 12px;
    font-weight: 800;
    font-size: .84rem;
  }
  pre {
    margin: 0;
    white-space: pre;
    overflow: auto;
    padding: 13px 14px;
    font: 13px/1.5 "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  .answer-panel pre { background: #FFFDF6; color: var(--ink); }
  .run-console { border-color: #2e3838; background: var(--code); }
  .run-console .panel-title {
    background: #0f1515;
    color: #d8efe1;
    border-bottom: 1px solid #2e3838;
  }
  .run-console pre { background: var(--code); color: #c8f7c5; }
  .run-console.error pre { color: #ffd6a8; }
  .console-runner {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    margin-right: 8px;
  }
  .console-runner i {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c8f7c5;
    animation: runPulse .9s ease-in-out infinite;
  }
  .console-runner i:nth-child(2) { animation-delay: .15s; }
  .console-runner i:nth-child(3) { animation-delay: .3s; }
  @keyframes runPulse { 0%, 100% { opacity: .3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-3px); } }
  .mismatch-preview {
    display: none;
    margin-top: 10px;
    border: 1px solid rgba(201,139,84,.45);
    background: #fff8ed;
    color: #5f3b1f;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: .86rem;
  }
  .mismatch-preview.show { display: block; }
  .mismatch-preview code {
    display: block;
    margin-top: 7px;
    overflow: auto;
    white-space: pre;
    background: #fff3d7;
    color: #3c2d17;
    border-radius: 8px;
    padding: 9px;
  }
  .bad-char {
    display: inline-block;
    min-width: 8px;
    border-radius: 5px;
    background: #ffd79e;
    color: #5a2c26;
    box-shadow: 0 0 0 2px rgba(232,201,122,.35), 0 0 14px rgba(184,116,107,.28);
    animation: wrongGlow 1.1s ease-in-out infinite;
  }
  @keyframes wrongGlow {
    0%, 100% { box-shadow: 0 0 0 2px rgba(232,201,122,.24), 0 0 10px rgba(184,116,107,.18); }
    50% { box-shadow: 0 0 0 3px rgba(232,201,122,.48), 0 0 18px rgba(184,116,107,.36); }
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 10px;
    margin-top: 16px;
  }
  .action-group { display: flex; flex-wrap: wrap; gap: 10px; }
  button.btn {
    border: 0;
    border-radius: 10px;
    background: var(--accent);
    color: #FBF7EC;
    cursor: pointer;
    font: inherit;
    font-weight: 800;
    min-height: 42px;
    padding: 10px 16px;
    transition: background .12s ease, transform .08s ease;
  }
  button.btn:hover:not(:disabled) { background: var(--accent-d); }
  button.btn:active:not(:disabled) { transform: translateY(1px); }
  button.btn:disabled { opacity: .55; cursor: default; }
  button.btn.ghost { background: transparent; color: var(--accent-d); border: 1.5px solid var(--accent); }
  button.btn.ghost:hover:not(:disabled) { background: var(--bg-soft); }
  button.btn.danger { background: var(--bad); color: #fffaf7; }
  button.btn.danger:hover:not(:disabled) { background: #96584f; }
  button.icon { min-width: 46px; padding-left: 12px; padding-right: 12px; }
  .result { text-align: center; padding: 10px 4px; }
  .result h2 { margin: 0 0 8px; color: var(--accent-d); font-size: 1.48rem; }
  .score-big { margin: 12px 0 4px; font-size: 2.7rem; line-height: 1; font-weight: 900; color: var(--ink); }
  .result-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 18px 0; text-align: left; }
  .wrong-list {
    margin: 14px auto 0;
    max-width: 760px;
    text-align: left;
    background: #FFFDF6;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
  }
  .wrong-list h3 { margin: 0 0 8px; color: var(--accent-d); font-size: 1rem; }
  .wrong-list p { margin: 7px 0; color: var(--muted); font-size: .9rem; }
  .loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
    min-height: 240px;
    background: transparent;
  }
  .loading-panel {
    width: min(100%, 460px);
    margin: 0 auto;
    background: linear-gradient(180deg, #FFFDF6 0%, var(--card) 100%);
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 18px;
    padding: 26px 18px 22px;
    box-shadow: 0 10px 28px rgba(46,58,58,.08), inset 0 1px 0 rgba(255,255,255,.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .loading-title {
    font-size: 1.35rem;
    font-weight: 700;
    margin: 16px 0 8px;
    letter-spacing: .2px;
    color: var(--accent-d);
    text-align: center;
  }
  .loading-sub {
    color: var(--muted);
    font-size: .92rem;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
  .loading-mini {
    margin-top: 10px;
    color: var(--muted);
    font-size: .8rem;
    text-align: center;
  }
  .wait-orb { position: relative; width: 108px; height: 108px; }
  .wait-core {
    position: absolute;
    inset: 38px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--card), #fff);
    border: 1px solid var(--line);
    box-shadow: inset 0 2px 8px rgba(46,58,58,.06);
  }
  .wait-ring { position: absolute; border-radius: 50%; border: 4px solid transparent; }
  .wait-ring.ring-a { inset: 0; border-top-color: var(--accent); border-right-color: #82AAA6; animation: spinRing 1s linear infinite; }
  .wait-ring.ring-b { inset: 12px; border-bottom-color: var(--hi); border-left-color: #9BBDB5; animation: spinRingReverse 1.35s linear infinite; }
  .wait-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #E8C97A;
    top: 10px;
    left: calc(50% - 6px);
    box-shadow: 0 0 0 5px rgba(232,201,122,.14);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes spinRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinRingReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  @keyframes dotPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.82); opacity: .75; } }
  footer { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 18px; }
  .hidden { display: none !important; }
  @media (max-width: 760px) {
    body { padding: 14px 10px 42px; }
    header { grid-template-columns: 1fr; }
    .timer-pill { width: fit-content; }
    .opening-top, .editor-grid, .quiz-meta, .question-head { grid-template-columns: 1fr; }
    .stat-grid, .result-grid { grid-template-columns: 1fr; }
    .card { padding: 18px 15px; }
    .editor-toolbar { align-items: stretch; flex-direction: column; }
    .editor-toolbar .btn { width: 100%; }
    textarea { min-height: 230px; font-size: 13px; }
    .actions { justify-content: stretch; }
    .action-group, button.btn { width: 100%; }
    .action-group { display: grid; grid-template-columns: 1fr 1fr; }
    .action-group.primary { grid-template-columns: 1fr; }
    .history li { align-items: flex-start; flex-direction: column; }
    .loading-panel { padding: 22px 14px 18px; }
    .wait-orb { width: 92px; height: 92px; }
    .wait-core { inset: 32px; }
    .loading-title { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Solidity Shakyo Exact-Match Quiz</h1>
      <p>Short Solidity snippets from the guide. Spaces, line breaks, punctuation, braces, and semicolons count.</p>
    </div>
    <div class="timer-pill idle" id="timerPill"><span class="stopwatch" aria-hidden="true"><span class="stopwatch-hand"></span></span><strong id="timer">Ready</strong></div>
  </header>
  <main class="card" id="app"></main>
  <footer>Built from the Solidity Shakyo extraction guide and styled from the universal quiz template.</footer>
</div>
<script>
const GUIDE = {
  "segments": [
    {
      "id": "A01",
      "priority": "P0",
      "file": "3. attacker.sol",
      "title": "Interface IFaucet",
      "purpose": "Attacker calls the Faucet through an interface, not through a full compiled Faucet object. This is the ABI-independent entry point.",
      "code": "interface IFaucet {\n    function withdraw(uint _withdrawAmount) external;\n}"
    },
    {
      "id": "A02",
      "priority": "P0",
      "file": "3. attacker.sol",
      "title": "Attacker state variables",
      "purpose": "The target faucet, amount per attack, and gas/reentrancy accounting variables.",
      "code": "IFaucet public faucet;\n\nuint public attackAmount = 0.01 ether;\n\nuint public startGas;\nuint public gasUsed;\nuint public cycleCount = 0;"
    },
    {
      "id": "A03",
      "priority": "P0",
      "file": "3. attacker.sol",

function escapeHTML(value) {
  return String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}

function normalizeInput(value) {
  return String(value ?? "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
}

function lineCount(value) {
  return normalizeInput(value).split("\n").length;
}

function formatTime(seconds) {
  const safe = Math.max(0, Number(seconds) || 0);
  const m = Math.floor(safe / 60);
  const s = safe % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function getScrollSnapshot() {
  if (typeof window === "undefined") return null;
  return { x: window.scrollX || 0, y: window.scrollY || 0 };
}

function restoreScroll(snapshot) {
  if (!snapshot || typeof window === "undefined" || typeof window.scrollTo !== "function") return;
  const restore = () => window.scrollTo({ left: snapshot.x, top: snapshot.y, behavior: "auto" });
  restore();
  if (typeof requestAnimationFrame === "function") {
    requestAnimationFrame(restore);
  } else {
    setTimeout(restore, 0);
  }
}

function keepScroll(action) {
  const snapshot = getScrollSnapshot();
  action();
  restoreScroll(snapshot);
}

function onClickKeepScroll(element, action) {
  if (!element) return;
  element.addEventListener("click", event => {
    event.preventDefault();
    keepScroll(action);
  });
}

function smoothScrollToResultTop() {
  if (typeof document === "undefined") return;
  const target = document.querySelector(".result") || app;
  if (target && typeof target.scrollIntoView === "function") {
    target.scrollIntoView({ behavior: "smooth", block: "start" });
  } else if (typeof window !== "undefined" && typeof window.scrollTo === "function") {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

function elementPageTop(element) {
  if (typeof window === "undefined" || !element || typeof element.getBoundingClientRect !== "function") return 0;
  return element.getBoundingClientRect().top + (window.scrollY || 0);
}

function smoothScrollToQuestionTop(duration = 1500) {
  if (typeof window === "undefined" || typeof window.scrollTo !== "function") return;
  const target = document.querySelector(".quiz-shell") || app;
  const startY = window.scrollY || 0;
  const targetY = Math.max(0, elementPageTop(target) - 8);
  const start = typeof performance !== "undefined" && performance.now ? performance.now() : Date.now();
  const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  const tick = now => {
    const elapsed = now - start;
    const progress = Math.min(1, elapsed / duration);
    const y = startY + (targetY - startY) * ease(progress);
    window.scrollTo({ top: y, behavior: "auto" });
    if (progress < 1 && typeof requestAnimationFrame === "function") requestAnimationFrame(tick);
  };
  if (typeof requestAnimationFrame === "function") {
    requestAnimationFrame(tick);
  } else {
    window.scrollTo({ top: targetY, behavior: "smooth" });
  }
}

function onClickQuestionNav(element, delta) {

  element.addEventListener("click", event => {
    event.preventDefault();
    moveBy(delta);

}

function getHistory() {
  try { return JSON.parse(localStorage.getItem(STORE + "history") || "[]"); } catch(e) { return []; }
}

function setHistory(history) {
  try { localStorage.setItem(STORE + "history", JSON.stringify(history)); } catch(e) {}
}

function lastHistory() {
  const history = getHistory();
  return history.length ? history[history.length - 1] : null;
}

function dayLabelFor(id) {
  const row = GUIDE.study_order.find(item => item[2].includes(id));

  if (modeKey === "wrong") {

  }
  if (modeKey === "p0") return DAY_ORDER.filter(id => BY_ID[id].priority === "P0");
  return DAY_ORDER.slice();
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleString([], { year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
  } catch(e) {
    return "saved run";
  }
}

function historyHTML() {
  const history = getHistory();
  if (!history.length) {
    return '<div class="history"><h3>Attempt Log</h3><p class="tiny-note">No saved runs yet.</p></div>';
  }
  const recent = history.slice(-5).reverse();
  const rows = recent.map((item, idx) => {
    const pct = item.total ? Math.round(item.score / item.total * 100) : 0;
    const wrong = Array.isArray(item.wrongIds) ? item.wrongIds.length : 0;
    return `<li><span><strong>${escapeHTML(item.modeLabel || "Run")}</strong><br><span class="meta">${escapeHTML(formatDate(item.submittedAt))} | wrong marks: ${wrong}</span></span><span class="score">${item.score} / ${item.total} | ${pct}%</span></li>`;
  }).join("");
  return `<div class="history"><h3>Attempt Log</h3><ol>${rows}</ol></div>`;
}

function startRun(modeKey) {

    return;
  }
  run = {
    modeKey,
    modeLabel: mode.label,
    official: mode.official,
    timed: mode.timed,
    totalSeconds: mode.seconds,
    remaining: mode.seconds,
    startedAt: new Date().toISOString(),
    order: ids,
    pos: 0,
    states: Object.fromEntries(ids.map(id => [id, { text: "", status: "blank", checks: 0, revealed: false, correctAt: null }]))
  };
  if (run.timed) startTimer();
  renderQuestion();
}

function startTimer() {
  stopTimer();
  timerPillEl.className = "timer-pill";
  timerPillEl.style.setProperty("--timer-duration", run.totalSeconds + "s");
  void timerPillEl.offsetWidth;
  timerPillEl.classList.add("running");
  timerEl.textContent = formatTime(run.remaining);
  timerHandle = setInterval(() => {
    if (!run) return stopTimer();
    run.remaining -= 1;
    timerEl.textContent = formatTime(run.remaining);
    timerPillEl.classList.toggle("warning", run.remaining <= 60);
    if (run.remaining <= 0) submitRun(true);
  }, 1000);
}

function stopTimer() {
  if (timerHandle) clearInterval(timerHandle);
  timerHandle = null;
}

function stopLoading() {
  if (loadingHandle) clearTimeout(loadingHandle);
  loadingHandle = null;
}

}

function getState(id) {
  return run.states[id] || (run.states[id] = { text: "", status: "blank", checks: 0, revealed: false, correctAt: null });
}

function canResetAfterReveal() {
  return run && ["all", "day", "wrong"].includes(run.modeKey);
}

function alwaysShowPracticeAnswer() {
  return run && ["day", "wrong"].includes(run.modeKey);
}

function progressStats() {
  const states = run.order.map(id => getState(id));
  const correct = states.filter(s => s.status === "correct").length;
  const closed = states.filter(s => s.status === "correct" || s.status === "revealed").length;
  return { correct, closed, total: run.order.length };
}

function firstMismatch(input, target) {
  const a = normalizeInput(input);
  const b = normalizeInput(target);
  if (a === b) return null;
  const max = Math.min(a.length, b.length);
  let i = 0;
  while (i < max && a[i] === b[i]) i += 1;
  const before = a.slice(0, i);
  const line = before.split("\n").length;
  const col = before.length - before.lastIndexOf("\n");
  if (i >= a.length) return { index: i, line, col, kind: "missing text after here", actual: "", expected: b[i] || "" };
  if (i >= b.length) return { index: i, line, col, kind: "extra text after target ends", actual: a[i] || "", expected: "" };
  return { index: i, line, col, kind: "different character", actual: a[i], expected: b[i] };
}

function bestMicroTarget(segment) {
  const code = segment.code;
  const direct = GUIDE.top_10.find(item => item.includes("...") ? code.includes(item.replace("...", "")) : code.includes(item));
  if (direct) return direct;
  if (segment.id === "T07" || segment.id === "T08") return "Assert.equal(...)";
  if (segment.id === "M04") return "locked = true; _; locked = false;";
  return "";
}

function fakeGuiFor(segment) {
  const file = segment.file;
  let name = "attacker.sol";
  if (file.includes("attack1_test")) name = "attack1_test.sol";
  if (file.includes("Faucet3Mutex")) name = "Faucet3Mutex.sol";
  if (file.includes("JavawanVault")) name = "JavawanVault_test.sol";
  const found = GUIDE.fake_gui.find(row => row[0] === name);
  if (found) return found[1];
  return "Compiled: Faucet3\nwithdraw() surface confirmed\ncall() pattern ready";
}

function visibleChar(ch) {
  if (ch === undefined || ch === null || ch === "") return "end of input";
  if (ch === "\n") return "line break";
  if (ch === " ") return "space";
  if (ch === "\t") return "tab";
  return '"' + ch + '"';
}

function visibleCodeChar(ch) {
  if (ch === undefined || ch === null || ch === "") return "missing";
  if (ch === "\n") return "[newline]";
  if (ch === " ") return "[space]";
  if (ch === "\t") return "[tab]";
  return ch;
}

function mismatchPreviewHTML(input, target) {
  const diff = firstMismatch(input, target);
  if (!diff) return "";
  const value = normalizeInput(input);
  const index = Math.max(0, diff.index || 0);
  const start = Math.max(0, index - 46);
  const end = Math.min(value.length, index + 47);
  const before = (start > 0 ? "..." : "") + value.slice(start, index);
  const after = value.slice(index + (diff.actual ? 1 : 0), end) + (end < value.length ? "..." : "");
  const glow = '<span class="bad-char">' + escapeHTML(visibleCodeChar(diff.actual || diff.expected)) + '</span>';
  const label = diff.actual ? "This part of your input is the first mismatch:" : "Your input stops here, but the answer still needs more code:";
  return '<strong>Line ' + diff.line + ', column ' + diff.col + '.</strong> ' + escapeHTML(label) + '<code>' + escapeHTML(before) + glow + escapeHTML(after) + '</code>';
}

function runErrorConsole(segment, state) {
  const diff = state.lastMismatch || firstMismatch(state.text, segment.code);
  if (!diff) return "Run stopped. The input changed before the checker finished.";
  let headline = "SyntaxError: unexpected token " + visibleChar(diff.actual) + "; expected " + visibleChar(diff.expected);
  if (diff.kind.indexOf("missing") !== -1) headline = "ParserError: source ended before the snippet was complete";
  if (diff.kind.indexOf("extra") !== -1) headline = "ParserError: unexpected extra input after the target snippet";
  return [
    "> remix run " + segment.file + " --snippet " + segment.id,
    "Compiling Solidity snippet...",
    headline,
    "Location: line " + diff.line + ", column " + diff.col,
    "Result: run failed before success output was produced."
  ].join("\n");
}

function runConsoleBody(segment, state) {
  if (state.runStatus === "running") {
    return '<span class="console-runner" aria-hidden="true"><i></i><i></i><i></i></span>' + escapeHTML("Running code...\nCompiling Solidity snippet...\nChecking exact output...");
  }
  if (state.runStatus === "success") {
    return escapeHTML("> remix run " + segment.file + " --snippet " + segment.id + "\nCompiling Solidity snippet...\nExecution complete.\n\n" + fakeGuiFor(segment) + "\n\nResult: success");
  }
  if (state.runStatus === "error") return escapeHTML(runErrorConsole(segment, state));
  return "";
}

function renderJump() {
  return `<div class="jump">${run.order.map((id, idx) => {
    const state = getState(id);
    const cls = [idx === run.pos ? "current" : "", state.status === "correct" ? "correct" : "", state.status === "revealed" ? "revealed" : ""].filter(Boolean).join(" ");
    return `<button class="${cls}" data-jump="${idx}" title="${escapeHTML(id)}">${idx + 1}</button>`;
  }).join("")}</div>`;
}

function renderQuestion() {
  const segment = currentSegment();
  const state = getState(segment.id);
  const stats = progressStats();
  const micro = bestMicroTarget(segment);
  const targetLines = lineCount(segment.code);
  const targetChars = normalizeInput(segment.code).length;
  const answerLocked = state.status === "correct" || state.status === "revealed";
  const inputLocked = answerLocked || state.runStatus === "running";
  const resetLocked = state.status === "correct" || (state.status === "revealed" && !canResetAfterReveal());
  const practiceAnswerVisible = alwaysShowPracticeAnswer();
  const showAnswerButton = practiceAnswerVisible ? "" : '<button class="btn danger" id="showBtn" ' + (answerLocked ? "disabled" : "") + '>Show answer</button>';
  const textareaClass = [
    state.status === "correct" ? "locked-correct" : "",
    state.status === "revealed" ? "locked-revealed" : "",
    state.runStatus === "error" ? "run-error" : ""
  ].filter(Boolean).join(" ");
  const runConsoleClass = [
    state.runStatus ? "show" : "",
    state.runStatus === "error" ? "error" : "",
    state.runStatus === "success" ? "success" : "",
    state.runStatus === "running" ? "running" : ""
  ].filter(Boolean).join(" ");
  const runConsoleTitle = state.runStatus === "running" ? "Running code" : state.runStatus === "error" ? "Console result" : "Successful code run";
  const mismatchPreview = state.runStatus === "error" ? mismatchPreviewHTML(state.text, segment.code) : "";
  const feedbackClass = state.status === "correct" ? "good" : state.status === "revealed" ? "bad" : state.checks ? "bad" : "";
  const feedbackText = state.status === "correct"
    ? "Exact match. Remix feedback unlocked."
    : state.status === "revealed"
      ? (canResetAfterReveal() ? "Answer revealed. Press Reset to clear it and try this snippet again." : "Answer revealed and saved as a wrong mark.")
      : state.checks
        ? "Not exact yet. Keep the spacing, line breaks, punctuation, braces, and semicolons aligned."
        : "";
  app.innerHTML = `
    <section class="quiz-shell">
      <div class="quiz-meta">
        <div>
          <div class="quiz-title">${escapeHTML(run.modeLabel)}</div>
          <div class="quiz-sub">${stats.correct} exact, ${stats.total - stats.closed} open, ${stats.total} total</div>
        </div>
        <button class="btn ghost" id="backHome">Opening page</button>
      </div>
      ${renderJump()}
      <div class="progress-track"><div class="progress-fill" style="width:${Math.round((stats.closed / stats.total) * 100)}%"></div></div>
      <article>
        <div class="question-head">
          <div>
            <div class="eyebrow">Snippet ${run.pos + 1} of ${run.order.length} | ${escapeHTML(segment.id)} | ${escapeHTML(dayLabelFor(segment.id))}</div>
            <h2 class="question-title">${escapeHTML(segment.title)}</h2>
            <div class="source">${escapeHTML(segment.file)} | ${escapeHTML(segment.priority)}</div>
          </div>
          <span class="pill ${segment.priority.toLowerCase()}">${escapeHTML(segment.priority)}</span>
        </div>
        <div class="purpose">${escapeHTML(segment.purpose)}${micro ? `<br><span class="target-chip">Micro-target: ${escapeHTML(micro)}</span>` : ""}</div>
        <div class="editor-grid">
          <div class="writer-panel">
            <div class="editor-toolbar">
              <span>Writing frame</span>
              <button class="btn" id="checkBtn" ${inputLocked ? "disabled" : ""}>Check and run the code</button>
            </div>
            <div class="answer-panel ${(state.status === "revealed" || practiceAnswerVisible) ? "show" : ""}" id="answerPanel">
              <div class="panel-title">Target answer</div>
              <pre>${escapeHTML(segment.code)}</pre>
            </div>
            <textarea id="answer" class="${escapeHTML(textareaClass)}" spellcheck="false" autocapitalize="off" autocomplete="off" rows="${Math.min(16, Math.max(7, targetLines + 3))}" ${inputLocked ? "disabled" : ""}>${escapeHTML(state.status === "revealed" ? segment.code : state.text)}</textarea>
            <div class="feedback ${feedbackClass}" id="feedback">${escapeHTML(feedbackText)}</div>
            <div class="mismatch-preview ${mismatchPreview ? "show" : ""}" id="mismatchPreview">${mismatchPreview}</div>
            <div class="run-console ${runConsoleClass}" id="runConsole">
              <div class="panel-title">${escapeHTML(runConsoleTitle)}</div>
              <pre>${runConsoleBody(segment, state)}</pre>
            </div>
          </div>
          <aside class="side-panel">
            <div class="metric-box"><b>Target shape</b><span>${targetLines} line${targetLines === 1 ? "" : "s"} | ${targetChars} characters</span></div>
            <div class="metric-box"><b>Your shape</b><span id="shapeNow">0 lines | 0 characters</span></div>
            <div class="metric-box"><b>First mismatch</b><div id="mismatchNow">Start typing to compare.</div></div>
          </aside>
        </div>
        <div class="actions">
          <div class="action-group">
            <button class="btn icon ghost" id="prevBtn" ${run.pos === 0 ? "disabled" : ""}>&lt;</button>
            <button class="btn icon ghost" id="nextBtn" ${run.pos === run.order.length - 1 ? "disabled" : ""}>&gt;</button>
            <button class="btn ghost" id="resetBtn" ${resetLocked ? "disabled" : ""}>Reset</button>
          </div>
          <div class="action-group primary">
            ${showAnswerButton}
            <button class="btn ghost" id="submitBtn">Finish run</button>
          </div>
        </div>
      </article>
    </section>
  `;
  wireQuestion(segment);
  updateLiveMetrics(segment);
}

function wireQuestion(segment) {
  app.querySelectorAll("[data-jump]").forEach(btn => onClickKeepScroll(btn, () => {
    saveText(segment.id);
    run.pos = Number(btn.dataset.jump);
    renderQuestion();
  }));
  onClickKeepScroll(document.getElementById("backHome"), () => renderOpening("Run paused. No new attempt was saved."));
  onClickQuestionNav(document.getElementById("prevBtn"), -1);
  onClickQuestionNav(document.getElementById("nextBtn"), 1);
  onClickKeepScroll(document.getElementById("resetBtn"), () => resetCurrent());
  onClickKeepScroll(document.getElementById("checkBtn"), () => checkCurrent());
  onClickKeepScroll(document.getElementById("showBtn"), () => revealCurrent());
  onClickKeepScroll(document.getElementById("submitBtn"), () => submitRun(false));
  const textarea = document.getElementById("answer");
  textarea.addEventListener("keydown", event => {
    if (event.key !== "Tab" || textarea.disabled) return;
    event.preventDefault();
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const before = textarea.value.slice(0, start);
    const after = textarea.value.slice(end);
    textarea.value = before + "    " + after;
    textarea.selectionStart = textarea.selectionEnd = start + 4;
    saveText(segment.id);
    updateLiveMetrics(segment);
  });
  textarea.addEventListener("input", () => {
    saveText(segment.id);
    updateLiveMetrics(segment);
  });
}

function saveText(id) {
  const textarea = document.getElementById("answer");
  if (!textarea || !run) return;
  const state = getState(id);
  if (state.status === "blank" || state.status === "typing") {
    state.text = normalizeInput(textarea.value);
    state.status = state.text ? "typing" : "blank";
  }
}

function updateLiveMetrics(segment) {
  const textarea = document.getElementById("answer");
  if (!textarea) return;
  const value = normalizeInput(textarea.value);
  const shape = document.getElementById("shapeNow");
  const mismatch = document.getElementById("mismatchNow");
  const lines = lineCount(value);
  const chars = value.length;
  shape.textContent = `${lines} line${lines === 1 ? "" : "s"} | ${chars} characters`;
  const diff = firstMismatch(value, segment.code);
  mismatch.textContent = diff ? `Line ${diff.line}, column ${diff.col}: ${diff.kind}.` : "Exact match.";
}

function highlightMismatchInTextarea() {
  const segment = currentSegment();
  const state = getState(segment.id);
  const textarea = document.getElementById("answer");
  const diff = firstMismatch(state.text, segment.code);
  if (!textarea || !diff || textarea.disabled) return;
  const start = Math.max(0, diff.index || 0);
  const end = diff.actual ? start + 1 : start;
  try {
    textarea.focus({ preventScroll: true });
  } catch(e) {
    try { textarea.focus(); } catch(inner) {}
  }
  try {
    textarea.setSelectionRange(start, end);
  } catch(e) {}
}

function moveBy(delta) {
  saveText(currentSegment().id);
  run.pos = Math.max(0, Math.min(run.order.length - 1, run.pos + delta));
  renderQuestion();
}

function resetCurrent() {
  const segment = currentSegment();
  const state = getState(segment.id);
  if (state.status === "correct") return;
  if (state.status === "revealed" && !canResetAfterReveal()) return;
  state.text = "";
  state.status = "blank";
  state.checks = 0;
  state.revealed = false;
  state.correctAt = null;
  state.runStatus = "";
  state.lastMismatch = null;
  state.runToken = null;
  renderQuestion();
}

function checkCurrent() {
  const segment = currentSegment();
  const state = getState(segment.id);
  const textarea = document.getElementById("answer");
  const value = normalizeInput(textarea.value);
  const token = Date.now() + Math.random();
  const exact = value === normalizeInput(segment.code);
  state.text = value;
  state.checks += 1;
  state.runStatus = "running";
  state.runToken = token;
  state.lastMismatch = exact ? null : firstMismatch(value, segment.code);
  state.status = value ? "typing" : "blank";
  renderQuestion();
  setTimeout(() => {
    if (!run) return;
    const finalScroll = getScrollSnapshot();
    const latest = getState(segment.id);
    if (latest.runToken !== token) return;
    if (exact) {
      latest.status = "correct";
      latest.correctAt = new Date().toISOString();
      latest.runStatus = "success";
      latest.lastMismatch = null;
    } else {
      latest.status = value ? "typing" : "blank";
      latest.runStatus = "error";
      latest.lastMismatch = firstMismatch(value, segment.code);
    }
    renderQuestion();
    restoreScroll(finalScroll);
    if (!exact) highlightMismatchInTextarea();
  }, 900);
}

function maybeAutoAdvance() {
  if (run.pos < run.order.length - 1) {
    setTimeout(() => {
      if (!run) return;
      const current = getState(run.order[run.pos]);
      if (current.status === "correct") keepScroll(() => moveBy(1));
    }, 650);
  }
}

function revealCurrent() {
  const segment = currentSegment();
  const state = getState(segment.id);
  state.text = segment.code;
  state.status = "revealed";
  state.revealed = true;
  state.runStatus = "";
  state.lastMismatch = null;
  state.runToken = null;
  renderQuestion();
}

function submitRun(timeExpired) {
  if (!run) return;
  const active = currentSegment();
  if (active) saveText(active.id);
  stopTimer();
  const states = run.states;
  const correctIds = run.order.filter(id => states[id].status === "correct");
  const wrongIds = run.order.filter(id => states[id].status !== "correct");
  const record = {
    modeKey: run.modeKey,
    modeLabel: run.modeLabel,
    official: run.official,
    score: correctIds.length,
    total: run.order.length,
    correctIds,
    wrongIds,
    submittedAt: new Date().toISOString(),
    startedAt: run.startedAt,
    timeExpired: Boolean(timeExpired),
    remainingSeconds: run.timed ? Math.max(0, run.remaining) : null
  };
  if (run.official) {
    const history = getHistory();
    history.push(record);
    setHistory(history);
  }
  showSubmissionLoading(record);
}

function showSubmissionLoading(record) {
  stopLoading();
  run = null;
  timerPillEl.className = "timer-pill idle";
  timerPillEl.style.removeProperty("--timer-duration");
  timerEl.textContent = "Wait";
  app.innerHTML = `
    <div class="loading-screen">
      <div class="loading-panel" role="status" aria-live="polite">
        <div class="wait-orb" aria-hidden="true">
          <div class="wait-ring ring-a"></div>
          <div class="wait-ring ring-b"></div>
          <div class="wait-core"></div>
          <div class="wait-dot"></div>
        </div>
        <div class="loading-title">Please wait...</div>
        <div class="loading-sub">${record.official ? "Submitting your quiz and saving this completion record in the browser." : "Finishing this practice run and preparing your result."}</div>
        <div class="loading-mini">This will take about 5 seconds.</div>
      </div>
    </div>
  `;
  loadingHandle = setTimeout(() => {
    loadingHandle = null;
    renderResult(record);
  }, 5000);
}

function renderResult(record) {
  stopLoading();
  run = null;
  timerPillEl.className = "timer-pill idle";
  timerPillEl.style.removeProperty("--timer-duration");
  timerEl.textContent = "Done";
  const pct = record.total ? Math.round(record.score / record.total * 100) : 0;
  const wrongDetails = record.wrongIds.map(id => BY_ID[id]).filter(Boolean);
  app.innerHTML = `
    <section class="result">
      <h2>${record.timeExpired ? "Time is up" : "Run complete"}</h2>
      <div class="score-big">${record.score} / ${record.total}</div>
      <p class="tiny-note">${pct}% exact match${record.official ? " | saved to attempt log" : " | practice run not saved"}</p>
      <div class="result-grid">
        <div class="stat"><b>${record.correctIds.length}</b><span>exact</span></div>
        <div class="stat"><b>${record.wrongIds.length}</b><span>wrong marks</span></div>
        <div class="stat"><b>${record.remainingSeconds == null ? "--" : formatTime(record.remainingSeconds)}</b><span>remaining</span></div>
      </div>
      ${wrongDetails.length ? `<div class="wrong-list"><h3>Wrong marks</h3>${wrongDetails.map(s => `<p><strong>${escapeHTML(s.id)}</strong> | ${escapeHTML(s.title)} <span class="meta">(${escapeHTML(s.file)})</span></p>`).join("")}</div>` : `<div class="feedback good">No wrong marks.</div>`}
      <div class="actions" style="justify-content:center">
        <button class="btn" id="openBtn">Opening page</button>
        ${record.wrongIds.length ? '<button class="btn ghost" id="wrongAgainBtn">Practice wrong marks</button>' : ""}
      </div>
    </section>
  `;
  smoothScrollToResultTop();
  onClickKeepScroll(document.getElementById("openBtn"), () => renderOpening());
  const wrongAgain = document.getElementById("wrongAgainBtn");
  if (wrongAgain) {
    onClickKeepScroll(wrongAgain, () => {
      const mode = MODES.wrong;
      mode.ids = record.wrongIds;
      const temp = {
        modeKey: "wrong",
        modeLabel: "Current Wrong Marks",
        official: false,
        timed: false,
        totalSeconds: 0,
        remaining: 0,
        startedAt: new Date().toISOString(),
        order: record.wrongIds.filter(id => BY_ID[id]),
        pos: 0,
        states: Object.fromEntries(record.wrongIds.filter(id => BY_ID[id]).map(id => [id, { text: "", status: "blank", checks: 0, revealed: false, correctAt: null }]))
      };
      run = temp;
      renderQuestion();
    });
  }
}

renderOpening();
</script>
</body>
</html>
